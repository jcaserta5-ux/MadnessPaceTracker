<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA Basketball Games Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>NCAA Basketball Games Tracker</h1>
    </header>
    <main>
        <section id="games"></section>
        <footer>
            <p>&copy; 2026 NCAA Basketball Games Tracker</p>
        </footer>
        <script src="script.js"></script>
    </main>
</body>
</html>

<script>
async function fetchGames() {
    const response = await fetch('https://api.ncaa.com/games/today');
    const data = await response.json();
    const gamesElement = document.getElementById('games');
    gamesElement.innerHTML = '';

    data.games.forEach(game => {
        const gameDiv = document.createElement('div');
        gameDiv.classList.add('game');

        const paceTrend = game.paceTrend > 0 ? 'up' : 'down';
        const paceArrow = paceTrend === 'up' ? '↑' : '↓';

        gameDiv.innerHTML = `<h2>${game.teamA} vs ${game.teamB}</h2>
            <p>Pace: ${game.pace} ${paceArrow}</p>
            <p>Over/Under: ${game.overUnder}</p>`;
        gamesElement.appendChild(gameDiv);
    });
}

fetchGames();
</script>
