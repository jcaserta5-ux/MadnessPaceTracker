<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madness Pace Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .game {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .game:active {
            transform: scale(0.98);
        }

        .teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 10px 0;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-name {
            font-weight: bold;
            font-size: 0.9em;
        }

        .score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .total {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        .status {
            text-align: center;
            font-size: 0.85em;
            padding: 5px 10px;
            background: #ffa502;
            color: white;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            width: 100%;
        }

        .status.live {
            background: #ff4757;
        }

        .status.final {
            background: #2ed573;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 30% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
        }

        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #000;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            color: white;
            padding: 20px;
            background: rgba(255,0,0,0.3);
            border-radius: 8px;
            margin: 20px 0;
        }

        .ou-info {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }

        .trend {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .over {
            color: #2ed573;
        }

        .under {
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏀 Madness Pace Tracker</h1>
            <p style="color: white;">NCAA D1 Basketball</p>
        </header>

        <div id="content">
            <div class="loading">⏳ Loading games...</div>
        </div>

        <div id="gameModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle"></h2>
                <div id="modalScores"></div>
                <div class="total" id="modalTotal"></div>
                <div class="ou-info">
                    <label>Set O/U Line:</label><br>
                    <input type="number" id="ouInput" placeholder="Enter total" step="0.5">
                    <button onclick="setOU()">Set Line</button>
                    <div class="trend" id="trendDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let games = [];
        let currentGame = null;
        let ouData = {};

        // Close modal
        document.querySelector('.close').onclick = () => {
            document.getElementById('gameModal').style.display = 'none';
        };

        window.onclick = (event) => {
            const modal = document.getElementById('gameModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        };

        async function fetchGames() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading">⏳ Loading games...</div>';
                
                // Using a simple test - you can manually add games or use a working API
                // This version starts empty - you can add games manually
                
                const response = await fetch('https://www.balldontlie.io/api/v1/games?dates[]=2026-03-20', {
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                games = data.data || [];

                if (games.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            📅 No games scheduled for today (${new Date().toLocaleDateString()})
                        </div>
                        <div style="color: white; text-align: center; padding: 20px;">
                            Check back later or try a different date!
                        </div>
                    `;
                    return;
                }

                displayGames();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ⚠️ Unable to load games right now
                    </div>
                    <div style="color: white; text-align: center; padding: 20px; font-size: 0.9em;">
                        The API server may be temporarily unavailable. Try refreshing in a few moments.
                    </div>
                `;
            }
        }

        function displayGames() {
            if (games.length === 0) {
                document.getElementById('content').innerHTML = '<p class="error">No games found</p>';
                return;
            }

            let html = '';
            games.forEach((game, idx) => {
                const homeScore = game.home_team_score || 0;
                const awayScore = game.visitor_team_score || 0;
                const total = homeScore + awayScore;
                const status = game.status === 'Final' ? 'final' : game.status === 'In Progress' ? 'live' : '';

                html += `
                    <div class="game" onclick="openGame(${idx})">
                        <div class="teams">
                            <div class="team">
                                <div class="team-name">${game.visitor_team?.full_name || 'Away'}</div>
                                <div class="score">${awayScore}</div>
                            </div>
                            <div style="color: #999;">vs</div>
                            <div class="team">
                                <div class="team-name">${game.home_team?.full_name || 'Home'}</div>
                                <div class="score">${homeScore}</div>
                            </div>
                        </div>
                        <div class="total">Total: ${total}</div>
                        <div class="status ${status}">${game.status}</div>
                    </div>
                `;
            });

            document.getElementById('content').innerHTML = html;
        }

        function openGame(idx) {
            currentGame = games[idx];
            const homeScore = currentGame.home_team_score || 0;
            const awayScore = currentGame.visitor_team_score || 0;
            const total = homeScore + awayScore;
            const gameId = currentGame.id;

            document.getElementById('modalTitle').textContent = 
                `${currentGame.visitor_team?.full_name} vs ${currentGame.home_team?.full_name}`;
            
            document.getElementById('modalScores').innerHTML = `
                <div class="teams">
                    <div class="team">
                        <div class="team-name">${currentGame.visitor_team?.full_name}</div>
                        <div class="score">${awayScore}</div>
                    </div>
                    <div style="color: #999;">vs</div>
                    <div class="team">
                        <div class="team-name">${currentGame.home_team?.full_name}</div>
                        <div class="score">${homeScore}</div>
                    </div>
                </div>
            `;

            document.getElementById('modalTotal').textContent = `Total: ${total}`;

            if (ouData[gameId]) {
                const ou = ouData[gameId];
                const trend = total > ou ? 'OVER 📈' : total < ou ? 'UNDER 📉' : 'EVEN';
                const trendClass = total > ou ? 'over' : total < ou ? 'under' : '';
                document.getElementById('trendDisplay').innerHTML = `
                    <div class="trend ${trendClass}">O/U: ${ou} - ${trend}</div>
                `;
            }

            document.getElementById('gameModal').style.display = 'block';
        }

        function setOU() {
            const ou = parseFloat(document.getElementById('ouInput').value);
            if (!ou || isNaN(ou)) {
                alert('Enter a valid number');
                return;
            }

            ouData[currentGame.id] = ou;
            document.getElementById('ouInput').value = '';

            const total = (currentGame.home_team_score || 0) + (currentGame.visitor_team_score || 0);
            const trend = total > ou ? 'OVER 📈' : 'UNDER 📉';
            const trendClass = total > ou ? 'over' : 'under';
            
            document.getElementById('trendDisplay').innerHTML = `
                <div class="trend ${trendClass}">O/U: ${ou} - ${trend}</div>
            `;
        }

        // Load games on page load
        window.addEventListener('load', () => {
            fetchGames();
            // Refresh every 30 seconds
            setInterval(fetchGames, 30000);
        });
    </script>
</body>
</html>
