<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madness Pace Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .game {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .game:active {
            transform: scale(0.98);
        }

        .teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 10px 0;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-name {
            font-weight: bold;
            font-size: 0.9em;
            word-wrap: break-word;
        }

        .score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .total {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        .status {
            text-align: center;
            font-size: 0.85em;
            padding: 5px 10px;
            background: #ffa502;
            color: white;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            width: 100%;
        }

        .status.live {
            background: #ff4757;
            animation: pulse 1s infinite;
        }

        .status.final {
            background: #2ed573;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 30% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #000;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #5568d3;
        }

        .ou-info {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }

        .trend {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .over {
            color: #2ed573;
        }

        .under {
            color: #ff4757;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.1em;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏀 Madness Pace Tracker</h1>
            <p style="color: white;">NCAA D1 Basketball - Live Data</p>
        </header>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading live games...</p>
            </div>
        </div>

        <div id="gameModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle"></h2>
                <div id="modalScores"></div>
                <div class="total" id="modalTotal"></div>
                <div class="ou-info">
                    <label>Set O/U Line:</label><br>
                    <input type="number" id="ouInput" placeholder="Enter total" step="0.5">
                    <button onclick="setOU()">Set Line</button>
                    <div class="trend" id="trendDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let games = [];
        let currentGame = null;
        let ouData = {};

        // Close modal
        document.querySelector('.close').onclick = () => {
            document.getElementById('gameModal').style.display = 'none';
        };

        window.onclick = (event) => {
            const modal = document.getElementById('gameModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        };

        async function fetchLiveGames() {
            try {
                document.getElementById('content').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading live games...</p>
                    </div>
                `;

                // Using CORS proxy to bypass CORS restrictions
                const corsProxy = 'https://cors-anywhere.herokuapp.com/';
                const espnUrl = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard';
                
                const response = await fetch(corsProxy + espnUrl, {
                    method: 'GET',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                games = data.events || [];

                if (games.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div style="text-align: center; color: white; padding: 40px;">
                            <p style="font-size: 1.2em;">📅 No NCAA games scheduled for today</p>
                            <p style="font-size: 0.9em; margin-top: 10px;">Check back during basketball season!</p>
                        </div>
                    `;
                    return;
                }

                displayGames();
            } catch (error) {
                console.error('Error:', error);
                
                // Fallback to sample data if API fails
                loadSampleGames();
            }
        }

        function loadSampleGames() {
            games = [
                {
                    id: '1',
                    competitions: [{
                        competitors: [
                            { team: { displayName: 'Duke' }, score: 72 },
                            { team: { displayName: 'UNC' }, score: 68 }
                        ]
                    }],
                    status: { detail: 'In Progress' }
                },
                {
                    id: '2',
                    competitions: [{
                        competitors: [
                            { team: { displayName: 'Kansas' }, score: 55 },
                            { team: { displayName: 'Texas' }, score: 58 }
                        ]
                    }],
                    status: { detail: 'In Progress' }
                },
                {
                    id: '3',
                    competitions: [{
                        competitors: [
                            { team: { displayName: 'Kentucky' }, score: 45 },
                            { team: { displayName: 'Auburn' }, score: 42 }
                        ]
                    }],
                    status: { detail: 'In Progress' }
                }
            ];

            document.getElementById('content').innerHTML = `
                <div style="text-align: center; color: white; padding: 20px;">
                    <p style="font-size: 1em; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 5px; margin-bottom: 20px;">
                        📡 Showing sample games (live API temporarily unavailable)
                    </p>
                </div>
            `;
            
            displayGames();
        }

        function displayGames() {
            if (games.length === 0) {
                document.getElementById('content').innerHTML = '<p style="color: white; text-align: center;">No games found</p>';
                return;
            }

            let html = '';
            games.forEach((game, idx) => {
                const competition = game.competitions[0];
                const competitors = competition.competitors;
                const away = competitors[0];
                const home = competitors[1];
                
                const awayScore = away.score || 0;
                const homeScore = home.score || 0;
                const total = awayScore + homeScore;
                
                let status = 'Scheduled';
                let statusClass = '';

                const detail = game.status.detail.toLowerCase();
                if (detail.includes('final')) {
                    status = 'Final';
                    statusClass = 'final';
                } else if (detail.includes('progress') || detail.includes('live')) {
                    status = '🔴 Live';
                    statusClass = 'live';
                }

                html += `
                    <div class="game" onclick="openGame(${idx})">
                        <div class="teams">
                            <div class="team">
                                <div class="team-name">${away.team.displayName}</div>
                                <div class="score">${awayScore}</div>
                            </div>
                            <div style="color: #999;">vs</div>
                            <div class="team">
                                <div class="team-name">${home.team.displayName}</div>
                                <div class="score">${homeScore}</div>
                            </div>
                        </div>
                        <div class="total">Total: ${total}</div>
                        <div class="status ${statusClass}">${status}</div>
                    </div>
                `;
            });

            document.getElementById('content').innerHTML = html;
        }

        function openGame(idx) {
            currentGame = games[idx];
            const competition = currentGame.competitions[0];
            const competitors = competition.competitors;
            const away = competitors[0];
            const home = competitors[1];
            
            const awayScore = away.score || 0;
            const homeScore = home.score || 0;
            const total = awayScore + homeScore;
            const gameId = currentGame.id;

            document.getElementById('modalTitle').textContent = 
                `${away.team.displayName} vs ${home.team.displayName}`;
            
            document.getElementById('modalScores').innerHTML = `
                <div class="teams">
                    <div class="team">
                        <div class="team-name">${away.team.displayName}</div>
                        <div class="score">${awayScore}</div>
                    </div>
                    <div style="color: #999;">vs</div>
                    <div class="team">
                        <div class="team-name">${home.team.displayName}</div>
                        <div class="score">${homeScore}</div>
                    </div>
                </div>
            `;

            document.getElementById('modalTotal').textContent = `Total: ${total}`;

            if (ouData[gameId]) {
                const ou = ouData[gameId];
                const trend = total > ou ? 'OVER 📈' : total < ou ? 'UNDER 📉' : 'EVEN';
                const trendClass = total > ou ? 'over' : total < ou ? 'under' : '';
                document.getElementById('trendDisplay').innerHTML = `
                    <div class="trend ${trendClass}">O/U: ${ou} - ${trend}</div>
                `;
            } else {
                document.getElementById('trendDisplay').innerHTML = '';
            }

            document.getElementById('gameModal').style.display = 'block';
        }

        function setOU() {
            const ou = parseFloat(document.getElementById('ouInput').value);
            if (!ou || isNaN(ou)) {
                alert('Enter a valid number');
                return;
            }

            ouData[currentGame.id] = ou;
            document.getElementById('ouInput').value = '';

            const competition = currentGame.competitions[0];
            const competitors = competition.competitors;
            const away = competitors[0];
            const home = competitors[1];
            const total = (away.score || 0) + (home.score || 0);
            
            const trend = total > ou ? 'OVER 📈' : 'UNDER 📉';
            const trendClass = total > ou ? 'over' : 'under';
            
            document.getElementById('trendDisplay').innerHTML = `
                <div class="trend ${trendClass}">O/U: ${ou} - ${trend}</div>
            `;
        }

        // Load games on page load
        window.addEventListener('load', () => {
            fetchLiveGames();
        });
    </script>
</body>
</html>
