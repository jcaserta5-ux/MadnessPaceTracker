<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA Division I – Live Scores</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .game {
      background: #161b22;
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto;
      row-gap: 8px;
      column-gap: 12px;
    }

    .team-name {
      font-size: 16px;
    }

    .team-score {
      font-size: 20px;
      font-weight: bold;
      text-align: right;
    }

    .meta {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>NCAA Division I – Live Scores</h1>
  <div id="games"></div>
  <div id="error" class="error"></div>

  <script>
    const API_KEY = "YOUR_API_KEY_HERE"; // <-- insert your OddsAPI key

    async function loadGames() {
      const ODDS_URL =
        `https://api.the-odds-api.com/v4/sports/basketball_ncaab/scores/?daysFrom=1&apiKey=${API_KEY}`;

      const PROXY =
        "https://madnesspacetracker.pages.dev/proxy?url=" +
        encodeURIComponent(ODDS_URL);

      const gamesDiv = document.getElementById("games");
      const errorDiv = document.getElementById("error");

      try {
        errorDiv.textContent = "";
        gamesDiv.innerHTML = "Loading…";

        const res = await fetch(PROXY, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const games = await res.json();

        if (!Array.isArray(games) || games.length === 0) {
          gamesDiv.innerHTML = "<p>No games found.</p>";
          return;
        }

        gamesDiv.innerHTML = "";

        games.forEach(g => {
          const home = g.home_team;
          const away = g.away_team;

          const homeScore = g.scores?.find(s => s.name === home)?.score ?? "0";
          const awayScore = g.scores?.find(s => s.name === away)?.score ?? "0";

          const div = document.createElement("div");
          div.className = "game";

          div.innerHTML = `
            <div class="teams">
              <div class="team-name">${away}</div>
              <div class="team-score">${awayScore}</div>

              <div class="team-name">${home}</div>
              <div class="team-score">${homeScore}</div>
            </div>

            <div class="meta">
              Status: ${g.completed ? "Final" : g.commence_time ? "Scheduled" : "Live"}<br>
              Start Time: ${new Date(g.commence_time).toLocaleTimeString([], {hour: "numeric", minute: "2-digit"})}
            </div>
          `;

          gamesDiv.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        errorDiv.textContent = "Error loading scoreboard.";
      }
    }

    loadGames();
    setInterval(loadGames, 10000);
  </script>

</body>
</html>
