<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA Division I – Live Scoreboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .game {
      background: #161b22;
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto;
      row-gap: 8px;
      column-gap: 12px;
    }

    .team-name {
      font-size: 16px;
    }

    .team-score {
      font-size: 20px;
      font-weight: bold;
      text-align: right;
    }

    .meta {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>NCAA Division I – Today’s Games</h1>
  <div id="games"></div>
  <div id="error" class="error"></div>

  <script>
    async function loadGames() {
      const ESPN_URL =
        "https://site.web.api.espn.com/apis/v2/sports/basketball/mens-college-basketball/scoreboard";

      const PROXY =
        "https://madnesspacetracker.pages.dev/proxy?url=" +
        encodeURIComponent(ESPN_URL);

      const gamesDiv = document.getElementById("games");
      const errorDiv = document.getElementById("error");

      try {
        errorDiv.textContent = "";
        gamesDiv.innerHTML = "Loading…";

        const res = await fetch(PROXY, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        const events = data.events || [];

        if (events.length === 0) {
          gamesDiv.innerHTML = "<p>No games scheduled today.</p>";
          return;
        }

        gamesDiv.innerHTML = "";

        events.forEach(ev => {
          const competition = ev.competitions?.[0] || {};
          const competitors = competition.competitors || [];

          const home = competitors.find(t => t.homeAway === "home") || {};
          const away = competitors.find(t => t.homeAway === "away") || {};

          const homeTeam = home.team || {};
          const awayTeam = away.team || {};

          const div = document.createElement("div");
          div.className = "game";

          div.innerHTML = `
            <div class="teams">
              <div class="team-name">${awayTeam.shortDisplayName || "Away"}</div>
              <div class="team-score">${away.score ?? "0"}</div>

              <div class="team-name">${homeTeam.shortDisplayName || "Home"}</div>
              <div class="team-score">${home.score ?? "0"}</div>
            </div>

            <div class="meta">
              Status: ${ev.status?.type?.shortDetail || "TBD"}<br>
              Clock: ${ev.status?.type?.state === "in" ? ev.status?.displayClock : "—"}<br>
              Period: ${ev.status?.period || "—"}<br>
              Start Time: ${new Date(ev.date).toLocaleTimeString([], {hour: "numeric", minute: "2-digit"})}<br>
              Network: ${competition.broadcasts?.[0]?.names?.[0] || "—"}
            </div>
          `;

          gamesDiv.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        errorDiv.textContent = "Error loading scoreboard.";
      }
    }

    loadGames();
    setInterval(loadGames, 15000);
  </script>

</body>
</html>
