<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA Tournament – Live Scoreboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .game {
      background: #161b22;
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto;
      row-gap: 8px;
      column-gap: 12px;
    }

    .team-name {
      font-size: 16px;
    }

    .team-score {
      font-size: 20px;
      font-weight: bold;
      text-align: right;
    }

    .meta {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>NCAA Tournament – Games</h1>
  <div id="games"></div>
  <div id="error" class="error"></div>

  <script>
    async function loadGames() {

      // HARD-CODED TO THE DATE YOU SHOWED IN YOUR JSON
      const NCAA_URL =
        "https://data.ncaa.com/casablanca/scoreboard/basketball-men/d1/2026/03/20/scoreboard.json";

      const PROXY =
        "https://madnesspacetracker.pages.dev/proxy?url=" +
        encodeURIComponent(NCAA_URL);

      const gamesDiv = document.getElementById("games");
      const errorDiv = document.getElementById("error");

      try {
        errorDiv.textContent = "";
        gamesDiv.innerHTML = "Loading…";

        const res = await fetch(PROXY, { cache: "no-store" });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        // FIX: NCAA tournament JSON wraps each game inside { game: {...} }
        const rawGames = data.games || [];
        const games = rawGames.map(g => g.game);

        if (games.length === 0) {
          gamesDiv.innerHTML = "<p>No games found.</p>";
          return;
        }

        gamesDiv.innerHTML = "";

        games.forEach(g => {
          const home = g.home || {};
          const away = g.away || {};

          const div = document.createElement("div");
          div.className = "game";

          div.innerHTML = `
            <div class="teams">
              <div class="team-name">${away.names?.short || "Away"}</div>
              <div class="team-score">${away.score ?? "0"}</div>

              <div class="team-name">${home.names?.short || "Home"}</div>
              <div class="team-score">${home.score ?? "0"}</div>
            </div>

            <div class="meta">
              Status: ${g.gameState || "TBD"}<br>
              Clock: ${g.contestClock || "—"}<br>
              Period: ${g.currentPeriod || "—"}<br>
              Network: ${g.network || "—"}<br>
              Round: ${g.bracketRound || "—"}<br>
              Start Time: ${g.startTime || "—"}
            </div>
          `;

          gamesDiv.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        errorDiv.textContent = "Error loading scoreboard.";
      }
    }

    loadGames();
    setInterval(loadGames, 15000);
  </script>

</body>
</html>
