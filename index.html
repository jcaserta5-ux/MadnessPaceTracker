<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA Live Game Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: #161b22;
      padding: 24px 32px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      text-align: center;
    }

    .status {
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto;
      row-gap: 12px;
      column-gap: 12px;
    }

    .team-name {
      font-size: 18px;
    }

    .team-score {
      font-size: 22px;
      font-weight: bold;
      text-align: right;
    }

    .meta {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.85;
    }

    .error {
      margin-top: 15px;
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>March Madness – Game 230</h1>
    <div class="status" id="status">Loading…</div>

    <div class="teams">
      <div class="team-name" id="away-name">Away</div>
      <div class="team-score" id="away-score">–</div>

      <div class="team-name" id="home-name">Home</div>
      <div class="team-score" id="home-score">–</div>
    </div>

    <div class="meta">
      <div id="clock">Clock: –</div>
      <div id="period">Period: –</div>
      <div id="venue">Venue: –</div>
    </div>

    <div class="error" id="error"></div>
  </div>

  <script>
    // NCAA GAME JSON (you can update the date if needed)
    const GAME_URL =
      "https://data.ncaa.com/casablanca/game/basketball-men/d1/2025/03/21/230/gamecenter.json";

    // Your Cloudflare proxy
    const PROXY =
      "https://madnesspacetracker.pages.dev/proxy?url=" +
      encodeURIComponent(GAME_URL);

    const els = {
      status: document.getElementById("status"),
      awayName: document.getElementById("away-name"),
      homeName: document.getElementById("home-name"),
      awayScore: document.getElementById("away-score"),
      homeScore: document.getElementById("home-score"),
      clock: document.getElementById("clock"),
      period: document.getElementById("period"),
      venue: document.getElementById("venue"),
      error: document.getElementById("error"),
    };

    async function fetchGame() {
      try {
        els.error.textContent = "";

        const res = await fetch(PROXY, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        const game = data.game || data;

        const home = game.home || {};
        const away = game.away || {};

        els.awayName.textContent =
          away.names?.short || away.names?.full || "Away";
        els.homeName.textContent =
          home.names?.short || home.names?.full || "Home";

        els.awayScore.textContent = away.score ?? "0";
        els.homeScore.textContent = home.score ?? "0";

        els.status.textContent =
          game.gameStateText ||
          game.status ||
          (game.gameState === "final" ? "Final" : "Live");

        els.clock.textContent = "Clock: " + (game.gameClock || "—");
        els.period.textContent = "Period: " + (game.currentPeriod || "—");

        const venue =
          game.venue ||
          (game.site ? `${game.site.city}, ${game.site.state}` : "TBD");

        els.venue.textContent = "Venue: " + venue;
      } catch (err) {
        els.error.textContent = "Error loading game data.";
        els.status.textContent = "Error";
        console.error(err);
      }
    }

    fetchGame();
    setInterval(fetchGame, 10000);
  </script>

</body>
</html>
